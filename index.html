<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ellia Nattel.K — Camera Motion</title>
    <style>
        /* ========================================
           BASE RESET & SHARED STYLES  (faithful to original)
        ======================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: #ffffff; color: #000000; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; position: relative; }

        /* cinematic easings — flowing, light, no bounce */
        :root{
            --dive: cubic-bezier(0.7, 0, 0.84, 0);   /* accelerate INTO the sheet */
            --land: cubic-bezier(0.16, 1, 0.3, 1);   /* settle, no overshoot      */
            --glide: cubic-bezier(0.65, 0, 0.35, 1); /* smooth two-way camera     */
        }

        .blueprint-canvas {
            position: fixed; top: 0; left: 0; width: 120%; height: 120%;
            background-color: #ffffff;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.035) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.035) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1; pointer-events: none;
            will-change: transform;
            transition: transform 0.9s var(--glide);
        }

        /* ========================================
           CAMERA STAGE
        ======================================== */
        .camera-stage { position: relative; z-index: 3; will-change: transform, opacity; }

        /* ========================================
           STATIC ARCHITECTURE  (original geometry)
        ======================================== */
        .primary-architecture-wrapper {
            position: relative; z-index: 3; max-width: 1600px; margin: 0 auto;
            display: grid; grid-template-columns: 1.3fr 2.2fr 2fr;
            padding: 80px 60px; gap: 0px;
        }
        .app-header {
            grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: flex-start;
            padding-bottom: 80px; opacity: 0;
            animation: softRise 0.9s var(--land) both; animation-delay: 0.5s;
        }
        @keyframes softRise { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: none; } }
        .brand-logo-container { max-width: 340px; height: auto; }
        .brand-logo-img { width: 100%; height: auto; display: block; }
        .app-navigation { display: flex; gap: 0px; align-items: center; padding-top: 10px; padding-right: 15%; }
        .app-navigation-link { font-size: 0.75rem; font-weight: 600; text-decoration: none; color: #000000; letter-spacing: 1.5px; padding: 0 15px; }
        .nav-divider { width: 1px; height: 14px; background-color: #000000; opacity: 0.4; }

        /* ========================================
           STRUCTURAL LINES  (original images + positions)
           animation swapped to a soft camera-reveal draw
        ======================================== */
        .structural-line-h1 {
            position: absolute; top: 52px; left: 0; width: 514px; height: 14px; z-index: 2;
            transform-origin: left center; clip-path: inset(0 100% 0 0);
            animation: drawRight 1.4s var(--glide) both; animation-delay: 0.2s;
            will-change: clip-path, transform;
        }
        .structural-line-v1 {
            position: absolute; left: 80px; bottom: 0; width: 14px; height: 80%; z-index: 2;
            clip-path: inset(100% 0 0 0);
        }
        .structural-line-h2 {
            position: absolute; bottom: 12%; right: 0; width: 72%; height: 14px; z-index: 2;
            clip-path: inset(0 0 0 100%);
        }
        .structural-line-v2 {
            position: absolute; right: 80px; top: 0; width: 14px; height: 100vh;
            clip-path: inset(0 0 100% 0);
        }
        /* product lines draw in as the camera lands */
        .product-line.show.structural-line-v1 { animation: drawUp   1.5s var(--glide) 0.15s both; }
        .product-line.show.structural-line-h2 { animation: drawLeft 1.6s var(--glide) 0.30s both; }
        .product-line.show.structural-line-v2 { animation: drawDown 1.7s var(--glide) 0.45s both; }

        @keyframes drawRight { from { clip-path: inset(0 100% 0 0); opacity: 0; } 8% { opacity: 1; } to { clip-path: inset(0 0 0 0); opacity: 1; } }
        @keyframes drawLeft  { from { clip-path: inset(0 0 0 100%); opacity: 0; } 8% { opacity: 1; } to { clip-path: inset(0 0 0 0); opacity: 1; } }
        @keyframes drawUp    { from { clip-path: inset(100% 0 0 0); opacity: 0; } 8% { opacity: 1; } to { clip-path: inset(0 0 0 0); opacity: 1; } }
        @keyframes drawDown  { from { clip-path: inset(0 0 100% 0); opacity: 0; } 8% { opacity: 1; } to { clip-path: inset(0 0 0 0); opacity: 1; } }

        /* ========================================
           GALLERY  (original masonry)
        ======================================== */
        #gallery-wrapper { grid-column: 1 / -1; }
        .masonry-gallery {
            column-count: 4; column-gap: 100px;
            padding: 0 80px; margin-top: 20px;
        }
        .gallery-item {
            margin-bottom: 50px; break-inside: avoid; opacity: 0;
            transform: translateY(22px);
            animation: tileRise 0.9s var(--land) both;
        }
        @keyframes tileRise { to { opacity: 1; transform: none; } }
        .gallery-item img { width: 100%; display: block; transition: transform 0.6s var(--land); }
        .gallery-item a { display:block; overflow:hidden; }
        .gallery-item img:hover { transform: scale(1.03); cursor: pointer; }

        /* ========================================
           PRODUCT VIEW  (original layout)
        ======================================== */
        .product-hero-facade {
            grid-column: 1; position: relative; display: flex; align-items: center;
            padding-left: 50px; padding-right: 20px; height: 480px;
        }
        .glitch-title { font-size: 3.2rem; font-weight: normal; line-height: 1.15; font-family: Garamond, serif; }
        .glitch-title .word-box { display: inline-block; white-space: nowrap; }
        .glitch-title .letter-box { display:inline-block; opacity:0; transform: translateY(14px);
            animation: letterGlide 0.7s var(--land) forwards; }
        @keyframes letterGlide { to { opacity:1; transform:none; } }

        .product-central-gallery {
            grid-column: 2; position: relative; display: flex; justify-content: center; align-items: center;
            height: 480px;
        }
        .slider-frame { position: relative; width: 100%; height: 100%; overflow: hidden; touch-action: pan-y; }
        .slider-track { display: flex; height: 100%; will-change: transform; }
        .slider-slide { flex: 0 0 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        .slider-slide img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
        .slider-pagination { position: absolute; left: 50%; transform: translateX(-50%); bottom: -30px; display: flex; gap: 10px; }
        .dot { position: relative; width: 30px; height: 2px; background: #ccc; transition: background 0.3s, transform 0.4s var(--land); cursor: pointer; }
        .dot.active { background: #000; transform: scaleX(1.1); }

        .product-manifesto-container {
            grid-column: 3; position: relative; display: flex; flex-direction: column; justify-content: center;
            padding-left: 60px; padding-right: 40px; height: 480px;
        }
        .manifesto-body-text { font-size: 1.25rem; line-height: 1.9; margin-bottom: 45px; color: #1a1a1a; max-width: 380px; }
        .manifesto-meta-box h4 { font-size: 0.78rem; font-weight: bold; letter-spacing: 2.5px; margin-bottom: 8px; }
        .manifesto-meta-box p { font-size: 0.90rem; color: #444444; }
        .related-series { margin-top: 35px; }
        .related-thumbnails { display: flex; gap: 12px; flex-wrap: wrap; }
        .related-thumbnails a { display:block; width:68px; height:68px; border:1px solid #ddd; overflow:hidden; border-radius:3px; transition: transform 0.5s var(--land); }
        .related-thumbnails a:hover { transform: translateY(-4px); }
        .related-thumbnails img { width:100%; height:100%; object-fit:cover; }

        /* product columns fade up as the camera lands */
        .product-hero-facade, .product-central-gallery, .product-manifesto-container { opacity: 0; }
        .product.land .product-hero-facade      { animation: colLand 0.9s var(--land) 0.10s both; }
        .product.land .product-central-gallery  { animation: colLand 1.0s var(--land) 0.20s both; }
        .product.land .product-manifesto-container { animation: colLand 0.9s var(--land) 0.30s both; }
        @keyframes colLand { from { opacity:0; transform: translateY(18px); } to { opacity:1; transform:none; } }

        /* product visibility via class — lets the mobile rule win over JS */
        #product-wrapper { display: none; }
        #product-wrapper.active { display: contents; }

        /* ========================================
           RESPONSIVE  (original breakpoint)
        ======================================== */
        @media (max-width: 1124px) {
            .masonry-gallery { column-count: 2; padding: 0 20px; column-gap: 30px; }
            .primary-architecture-wrapper { padding: 40px 24px; display: block; }
            .structural-line-h1 { display: none !important; }
            .app-navigation { padding-right: 0; }
            .product-hero-facade, .product-central-gallery, .product-manifesto-container { padding: 20px 0; height: auto; }
            .product-central-gallery { height: 60vw; max-height: 360px; }
            .structural-line-v1, .structural-line-v2, .structural-line-h2 { display: none !important; }
            #product-wrapper.active { display: block; }
        }

        /* ========================================
           PHONE  (single-column, touch-tuned)
        ======================================== */
        @media (max-width: 760px) {
            .primary-architecture-wrapper { padding: 26px 16px 70px; }

            /* header keeps CONTACT | ABOUT but fits a 320px viewport */
            .app-header { padding-bottom: 40px; align-items: center; }
            .brand-logo-container { max-width: min(200px, 48vw); }
            .app-navigation { padding-top: 0; }
            .app-navigation-link { display: inline-flex; align-items: center; min-height: 44px;
                font-size: 0.72rem; padding: 0 10px; letter-spacing: 1px; }

            /* gallery: one large image per row */
            .masonry-gallery { column-count: 1; column-gap: 0; padding: 0 4px; margin-top: 8px; }
            .gallery-item { margin-bottom: 34px; }

            /* product: stacked, comfortable reading sizes */
            .glitch-title { font-size: 2.1rem; line-height: 1.18; }
            .product-hero-facade { padding: 4px 4px 0; }
            .product-central-gallery { height: 82vw; max-height: 420px; padding: 8px 0 28px; }
            .product-manifesto-container { padding: 8px 4px 0; }
            .manifesto-body-text { font-size: 1.1rem; line-height: 1.8; margin-bottom: 32px; max-width: none; }

            /* larger, invisible tap area for the thin pager dots (~44px) */
            .slider-pagination { bottom: 4px; gap: 14px; }
            .dot { height: 3px; }
            .dot::after { content: ""; position: absolute; inset: -21px -8px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation-duration: 0.01ms !important; animation-delay: 0ms !important; transition-duration: 0.15s !important; }
            .gallery-item, .glitch-title .letter-box,
            .product-hero-facade, .product-central-gallery, .product-manifesto-container { opacity: 1 !important; transform: none !important; }
            .blueprint-canvas { transition: none !important; }
        }
    </style>
</head>
<body>

    <div class="blueprint-canvas" id="canvas"></div>

    <!-- original structural-line images -->
    <img src="images/line-top-left.png" alt="" class="structural-line-h1" onerror="this.style.display='none'">
    <img src="images/line-bottom-right-h.png" alt="" class="structural-line-h2 product-line" style="display:none" onerror="this.dataset.broken=1">
    <img src="images/line-bottom-left-v.png" alt="" class="structural-line-v2 product-line" style="display:none" onerror="this.dataset.broken=1">
    <img src="images/line-bottom-left-v.png" alt="" class="structural-line-v1 product-line" style="display:none" onerror="this.dataset.broken=1">

    <div class="camera-stage" id="stage">
        <div class="primary-architecture-wrapper">

            <header class="app-header">
                <div class="brand-logo-container">
                    <a href="#" id="logo"><img src="images/logo.png" alt="Ellia Nattel.K DESIGNER" class="brand-logo-img" onerror="this.style.display='none'"></a>
                </div>
                <nav class="app-navigation">
                    <a href="#contact" class="app-navigation-link">CONTACT</a>
                    <div class="nav-divider"></div>
                    <a href="#about" class="app-navigation-link">ABOUT</a>
                </nav>
            </header>

            <!-- GALLERY -->
            <div id="gallery-wrapper" style="grid-column: 1 / -1;">
                <main id="gallery-view" class="masonry-gallery"></main>
            </div>

            <!-- PRODUCT VIEW -->
            <div id="product-wrapper" class="product" style="grid-column: 1 / -1;">
                <section class="product-hero-facade">
                    <h2 class="glitch-title" id="p-title">Folded Asymmetric Earrings</h2>
                </section>
                <section class="product-central-gallery">
                    <div class="slider-frame" id="frame"><div class="slider-track" id="track"></div></div>
                    <div class="slider-pagination" id="pager"></div>
                </section>
                <section class="product-manifesto-container">
                    <p class="manifesto-body-text" id="p-body"></p>
                    <div class="manifesto-meta-box">
                        <h4>MATERIALS :</h4>
                        <p id="p-materials"></p>
                    </div>
                    <div class="related-series" id="same-series" style="display:none;">
                        <h4 style="font-size:0.78rem; font-weight:bold; letter-spacing:2.5px; margin-bottom:12px;">SAME SERIES</h4>
                        <div class="related-thumbnails" id="thumbs"></div>
                    </div>
                </section>
            </div>

        </div>
    </div>

    <script>
    /* ================= DATA (unchanged from original) ================= */
    const products = [
        { id: 1, title: "Interwoven Link Necklace", description: "Intricately interwoven rectangular links form a sculptural geometric statement necklace with rich depth and natural movement.", materials: "Brass", images: ["1.png", "1-1.png", "1-2.png"], related: ["1-a", "1-b"] },
        { id: 2, title: "Folded Asymmetric Earrings", description: "Hand-sculpted folded earrings. Each earring consists of two interlocking parts — front and back — creating a complex three dimensional form.", materials: "925 Sterling silver", images: ["2.png", "2-1.png"], related: ["2-a", "2-b"] },
        { id: 3, title: "Branch Drop Earrings", description: "An abstract interpretation of a branch with leaves — these long silver drop earrings feature a delicate linear structure with refined sculptural detail.", materials: "925 Sterling silver, oxidized", images: ["3.png", "3-1.png"] },
        { id: 4, title: "Interwoven Link Necklace", description: "Intricately interwoven rectangular links form a sculptural geometric statement necklace with rich depth and natural movement.", materials: "Brass", images: ["4.png", "4-1.png"] },
        { id: 5, title: "Folded Contour Earrings", description: "Hand folded rectangular contours create an interesting three-dimensional geometric form with a modern silhouette.", materials: "Brass/925 Sterling silver, oxidized", images: ["5.png", "5-1.png"] },
        { id: 7, title: "Tangled Ring", description: "Handcrafted ring with an organic, interwoven structure.", materials: "blackened brass", images: ["7.png", "7-1.png", "7-2.png"] },
        { id: 8, title: "Sculpted contours", description: "Hand sculpted, free form contours earrings. Model No. 5 (small)", materials: "925 Sterling silver", images: ["8.png", "8-1.png"] },
        { id: 9, title: "Sculpted contours", description: "Hand sculpted, free form contours earrings. Model No. 5 (small)", materials: "925 Sterling silver", images: ["9.png", "9-1.png"] },
        { id: 10, title: "Wild Stone Ring", description: "Handcrafted ring set with a natural black stone found in the wild, featuring a white vein across it. The surface was gently polished to highlight its natural pattern.", materials: "925 Sterling silver, Natural stone", images: ["10.png", "10-1.png"] },
        { id: 11, title: "Acer Seed Earrings", description: "Inspired by Acer (maple) seeds, these handcrafted earrings present a structured geometric interpretation of the natural form. Asymmetric pair.", materials: "Brass", images: ["11.png", "11-1.png"] },
        { id: 12, title: "Wire Sketch Earrings", description: "Handcrafted geometric frames made from flattened metal wire. These earrings create a large-volume, three-dimensional sketch-like appearance while remaining surprisingly lightweight.", materials: "925 Sterling silver, oxidized", images: ["12.png", "12-1.png"] },
        { id: 13, title: "Folded Heart Ring", description: "Handcrafted brass ring featuring a geometric folded heart. The sculptural form creates a bold yet minimal statement with a modern edge.", materials: "Brass", images: ["13.png", "13-1.png", "13-2.png"] },
        { id: 14, title: "Geometric Link Necklace", description: "Bold architectural rectangular links with unique pivoting connections create a sculptural yet fluid silhouette. This modern piece blends minimalist elegance with strong geometric presence.", materials: "Oxidized Brass", images: ["14.png", "14-1.png"] },
        { id: 15, title: "Geometric Link Necklace", description: "Bold architectural rectangular links with unique pivoting connections create a sculptural yet fluid silhouette. This modern piece blends minimalist elegance with strong geometric presence.", materials: "Oxidized Brass", images: ["15.png", "15-1.png"] },
        { id: 16, title: "Layered Rectangle Earrings", description: "Handcrafted brass earrings with layered rectangular forms. Elongated geometric structure with clean modern lines.", materials: "Brass", images: ["16.png", "16-1.png"] },
        { id: 17, title: "Sculpted contours", description: "Hand sculpted, free form contours earrings. Model No. 6 (small)", materials: "blackened brass", images: ["17.png", "17-1.png", "17-2.png"] },
        { id: "1-a", title: "Sculpted contours", description: "Hand sculpted, free form contours ring Model No. 2 (medium)", materials: "925 Sterling silver", images: ["1-a.png", "1-a-1.png", "1-a-2.png"], related: [1] },
        { id: "1-b", title: "Sculpted contours", description: "Hand sculpted, free form contours ring Model No. 4 (small)", materials: "925 Sterling silver", images: ["1-b.png", "1-b-1.png", "1-b-2.png"], related: [1] },
        { id: "2-a", title: "Folded Asymmetric Earrings", description: "Hand-sculpted folded earrings. Each earring consists of two interlocking parts — front and back — creating a complex three dimensional form.", materials: "brass", images: ["2-a.png"], related: [2] },
        { id: "2-b", title: "Folded Asymmetric Earrings", description: "Hand-sculpted folded earrings. Each earring consists of two interlocking parts — front and back — creating a complex three dimensional form.", materials: "brass", images: ["2-b.png"], related: [2] }
    ];

    const REDUCED = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const galleryWrap = document.getElementById('gallery-wrapper');
    const productWrap  = document.getElementById('product-wrapper');
    const stage        = document.getElementById('stage');
    const canvas       = document.getElementById('canvas');
    let view = 'gallery';
    const killStageAnims = () => { try { stage.getAnimations().forEach(a => a.cancel()); } catch(e){} };

    /* camera intensity — lighter/faster on phones for smooth 60fps on weak GPUs.
       Snapshot once per transition (see callers) so a mid-transition rotation stays consistent. */
    const isPhone = () => window.matchMedia('(max-width: 760px)').matches;
    const camVals = () => isPhone()
        ? { dive: 1.5, land: 1.08, recede: 0.9,  pull: 1.1,  drift: 0.06 }
        : { dive: 2.1, land: 1.12, recede: 0.82, pull: 1.22, drift: 0.12 };

    /* ================= GALLERY ================= */
    function initGallery(){
        const gallery = document.getElementById('gallery-view');
        gallery.innerHTML = '';
        let n = 0;
        products.forEach(p => {
            if (typeof p.id !== 'number') return;
            const div = document.createElement('div');
            div.className = 'gallery-item';
            div.style.animationDelay = (0.2 + (++n) * 0.07).toFixed(2) + 's';
            const a = document.createElement('a'); a.href = '#';
            const img = document.createElement('img');
            img.src = `images/${p.id}.png`; img.alt = p.title; img.loading = 'lazy';
            img.onerror = () => { img.onerror = null; a.style.minHeight = '160px';
                a.style.background = 'repeating-linear-gradient(45deg,#fafafa,#fafafa 8px,#f1f1f1 8px,#f1f1f1 16px)'; img.remove(); };
            a.appendChild(img); div.appendChild(a); gallery.appendChild(div);
            a.addEventListener('click', e => { e.preventDefault(); cameraToProduct(p.id, a); });
        });
    }

    /* ================= CAMERA: GALLERY → PRODUCT =================
       Dive into the clicked piece, then land on the product laid
       out elsewhere on the drafting sheet. Grid + lines parallax. */
    function cameraToProduct(id, sourceEl){
        const product = products.find(p => p.id === id);
        if (!product || view !== 'gallery') return;
        view = 'animating';

        if (REDUCED){ swapToProduct(product); return; }
        killStageAnims();
        const cam = camVals();

        // origin = the clicked tile, in stage-local coordinates
        let r = sourceEl ? sourceEl.getBoundingClientRect() : null;
        if (!r || (r.width === 0 && r.height === 0)) {   // detached/empty → dive from viewport centre
            r = { left: window.innerWidth/2 - 80, top: window.innerHeight/2 - 80, width: 160, height: 160 };
        }
        const s = stage.getBoundingClientRect();
        const ox = (r.left + r.width/2)  - s.left;
        const oy = (r.top  + r.height/2) - s.top;
        stage.style.transformOrigin = `${ox}px ${oy}px`;

        // directional drift so the camera also travels sideways across the sheet
        const dx = (window.innerWidth/2  - (r.left + r.width/2)) * cam.drift;
        const dy = (window.innerHeight/2 - (r.top + r.height/2)) * cam.drift;
        canvas.style.transform = `translate(${dx*1.6}px, ${dy*1.6}px) scale(1.06)`;

        stage.animate([
            { transform: 'scale(1) translate(0,0)', opacity: 1 },
            { transform: `scale(${cam.dive}) translate(${dx}px, ${dy}px)`, opacity: 0 }
        ], { duration: 620, easing: getComputedStyle(document.documentElement).getPropertyValue('--dive').trim() || 'cubic-bezier(0.7,0,0.84,0)', fill: 'forwards' })
        .finished.then(() => landOnProduct(product, cam)).catch(() => landOnProduct(product, cam));
    }

    function landOnProduct(product, cam = camVals()){
        swapContent(product);
        galleryWrap.style.display = 'none';
        productWrap.classList.add('active');
        showLines(true);
        window.scrollTo({ top: 0 });

        // camera arrives: pull from a slight push-in back to rest
        stage.style.transformOrigin = '50% 30%';
        canvas.style.transform = 'translate(0,0) scale(1)';
        stage.animate([
            { transform: `scale(${cam.land})`, opacity: 0 },
            { transform: 'scale(1)',           opacity: 1 }
        ], { duration: 760, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' })
        .finished.then(() => { stage.style.transform=''; stage.style.transformOrigin=''; view = 'product'; })
        .catch(() => { view = 'product'; });

        // replay the column / letter / line reveals
        productWrap.classList.remove('land'); void productWrap.offsetWidth; productWrap.classList.add('land');
    }

    function swapToProduct(product){           // reduced-motion path
        swapContent(product);
        galleryWrap.style.display = 'none';
        productWrap.classList.add('active');
        productWrap.classList.add('land');     // defensive: reveal columns even if the reduced-motion CSS is inactive
        showLines(true);
        window.scrollTo({ top: 0 });
        view = 'product';
    }

    /* fill all product fields + slider + same-series + animated title */
    function swapContent(product){
        setTitle(product.title);
        document.getElementById('p-body').textContent = product.description;
        document.getElementById('p-materials').textContent = product.materials;
        buildSlider(product);
        buildSameSeries(product);
    }

    function setTitle(text){
        const t = document.getElementById('p-title');
        t.innerHTML = '';
        let i = 0;
        const words = text.split(' ');
        words.forEach((word, wi) => {
            const wb = document.createElement('span');
            wb.className = 'word-box';
            [...word].forEach(ch => {
                const span = document.createElement('span');
                span.className = 'letter-box';
                span.textContent = ch;
                span.style.animationDelay = (0.2 + (i++) * 0.03).toFixed(3) + 's';
                wb.appendChild(span);
            });
            t.appendChild(wb);
            if (wi < words.length - 1) t.appendChild(document.createTextNode(' '));
        });
    }

    /* ================= CAMERA: PRODUCT → GALLERY ================= */
    function cameraToGallery(){
        if (view !== 'product') return;
        view = 'animating';
        stopAuto();
        showLines(false);

        const done = () => {
            productWrap.classList.remove('active');
            productWrap.classList.remove('land');
            galleryWrap.style.display = 'block';
            stage.style.transform=''; stage.style.transformOrigin='';
            canvas.style.transform = 'translate(0,0) scale(1)';
            window.scrollTo({ top: 0 });
            view = 'gallery';
        };

        if (REDUCED){ done(); return; }
        killStageAnims();
        const cam = camVals();

        // EXIT = reverse of the dive: camera pulls BACK (zoom-out).
        // The product recedes/shrinks away, then the whole gallery is
        // revealed by pulling back from an over-zoomed state to rest.
        stage.style.transformOrigin = '50% 35%';
        canvas.style.transform = 'scale(0.97)';              // grid recedes slightly
        stage.animate([
            { transform: 'scale(1)',              opacity: 1 },
            { transform: `scale(${cam.recede})`,  opacity: 0 }
        ], { duration: 480, easing: 'cubic-bezier(0.65,0,0.35,1)', fill: 'forwards' })
        .finished.then(() => {
            done();                                          // resets canvas to scale(1) — grid settles back
            stage.style.transformOrigin = '50% 35%';
            stage.animate([
                { transform: `scale(${cam.pull})`, opacity: 0 },   // gallery starts over-zoomed…
                { transform: 'scale(1)',           opacity: 1 }    // …and pulls back to the full view
            ], { duration: 700, easing: 'cubic-bezier(0.16,1,0.3,1)', fill: 'forwards' })
            .finished.then(()=>{ stage.style.transform=''; stage.style.transformOrigin=''; }).catch(()=>{});
        }).catch(done);
    }

    /* ================= STRUCTURAL LINES ================= */
    function showLines(show){
        document.querySelectorAll('.product-line').forEach(l => {
            l.classList.remove('show');
            l.style.display = show && !l.dataset.broken ? 'block' : 'none';
            void l.offsetWidth;
            if (show) l.classList.add('show');
        });
    }

    /* ================= SLIDER (drag + momentum + autoplay) ================= */
    const frame = document.getElementById('frame');
    const track = document.getElementById('track');
    const pager = document.getElementById('pager');
    let slides = [], dots = [], index = 0, auto = null;

    function buildSlider(product){
        track.innerHTML = ''; pager.innerHTML = ''; index = 0;
        (product.images || []).forEach((name,i) => {
            const slide = document.createElement('div'); slide.className = 'slider-slide';
            const img = document.createElement('img'); img.src = `images/${name}`; img.alt = `${product.title} ${i+1}`;
            img.onerror = () => { img.onerror = null; img.style.visibility = 'hidden'; };
            slide.appendChild(img); track.appendChild(slide);
            const dot = document.createElement('span'); dot.className = 'dot' + (i===0?' active':'');
            dot.addEventListener('click', () => { stopAuto(); goTo(i,true); startAuto(); });
            pager.appendChild(dot);
        });
        slides = [...track.querySelectorAll('.slider-slide')];
        dots = [...pager.querySelectorAll('.dot')];
        pager.style.display = slides.length > 1 ? 'flex' : 'none';
        setTrack(0,false);
        startAuto();
    }
    function setTrack(px, animate){
        track.style.transition = animate ? 'transform 0.7s var(--land)' : 'none';
        track.style.transform = `translate3d(${px}px,0,0)`;
    }
    function goTo(i, animate){
        index = Math.max(0, Math.min(i, slides.length-1));
        setTrack(-index * frame.clientWidth, animate);
        dots.forEach((d,di) => d.classList.toggle('active', di===index));
    }
    let drag=false, startX=0, basePx=0, lastX=0, lastT=0, vx=0;
    frame.addEventListener('pointerdown', e => {
        if (slides.length < 2) return;
        drag = true; stopAuto();
        startX = lastX = e.clientX; lastT = performance.now(); vx = 0;
        basePx = -index * frame.clientWidth;
        track.style.transition = 'none';
        frame.setPointerCapture(e.pointerId);
    });
    frame.addEventListener('pointermove', e => {
        if (!drag) return;
        let pos = basePx + (e.clientX - startX);
        const max = 0, min = -(slides.length-1) * frame.clientWidth;
        if (pos > max) pos = max + (pos-max)*0.35;
        if (pos < min) pos = min + (pos-min)*0.35;
        setTrack(pos, false);
        const now = performance.now(), dt = now - lastT;
        if (dt > 0) vx = (e.clientX - lastX) / dt;   // px/ms of the latest move
        lastX = e.clientX; lastT = now;
    });
    function endDrag(e){
        if (!drag) return; drag = false;
        const dx = e.clientX - startX;
        const v = vx;
        const w = frame.clientWidth;
        let target = index;
        if (dx < -w*0.18 || v < -0.45) target = index + 1;
        else if (dx > w*0.18 || v > 0.45) target = index - 1;
        goTo(target, true); startAuto();
    }
    frame.addEventListener('pointerup', endDrag);
    frame.addEventListener('pointercancel', endDrag);
    window.addEventListener('resize', () => { if (view==='product') setTrack(-index*frame.clientWidth, false); });
    function startAuto(){ stopAuto(); if (REDUCED || slides.length < 2) return; auto = setInterval(() => goTo((index+1)%slides.length, true), 3000); }
    function stopAuto(){ if (auto){ clearInterval(auto); auto = null; } }

    /* ================= SAME SERIES ================= */
    function buildSameSeries(product){
        const wrap = document.getElementById('same-series');
        const thumbs = document.getElementById('thumbs');
        thumbs.innerHTML = '';
        const rel = (product.related || []).map(id => products.find(p => p.id === id)).filter(Boolean);
        if (!rel.length){ wrap.style.display = 'none'; return; }
        rel.forEach(rp => {
            const a = document.createElement('a'); a.href = '#';
            const img = document.createElement('img');
            img.src = `images/${rp.id}_thumb.png`; img.alt = rp.title;
            img.onerror = () => { img.onerror=null; img.src = `images/${(rp.images&&rp.images[0])||rp.id+'.png'}`; };
            a.appendChild(img);
            a.addEventListener('click', e => { e.preventDefault(); relatedJump(rp.id); });
            thumbs.appendChild(a);
        });
        wrap.style.display = 'block';
    }
    /* product → related product: a quick light glide (not the full dive) */
    function relatedJump(id){
        if (view !== 'product') return;
        const product = products.find(p => p.id === id); if (!product) return;
        view = 'animating';
        stopAuto();
        if (REDUCED){ swapContent(product); showLines(true); window.scrollTo({ top: 0 }); view = 'product'; return; }
        killStageAnims();
        stage.style.transformOrigin = '50% 35%';
        stage.animate([{opacity:1, transform:'scale(1)'},{opacity:0, transform:'scale(1.06)'}],
            {duration:300, easing:'cubic-bezier(0.65,0,0.35,1)', fill:'forwards'})
        .finished.then(() => {
            swapContent(product); showLines(true);
            productWrap.classList.remove('land'); void productWrap.offsetWidth; productWrap.classList.add('land');
            stage.animate([{opacity:0, transform:'scale(0.97)'},{opacity:1, transform:'scale(1)'}],
                {duration:520, easing:'cubic-bezier(0.16,1,0.3,1)', fill:'forwards'})
            .finished.then(()=>{ stage.style.transform=''; stage.style.transformOrigin=''; view = 'product'; }).catch(()=>{ view = 'product'; });
            window.scrollTo({ top: 0 });
        }).catch(()=>{ view = 'product'; });
    }

    /* ================= LOGO → HOME + scroll parallax ================= */
    document.getElementById('logo').addEventListener('click', e => {
        if (view === 'product' || view === 'animating'){ e.preventDefault(); cameraToGallery(); }
    });
    if (!REDUCED){
        let ticking = false;
        window.addEventListener('scroll', () => {
            if (ticking) return; ticking = true;
            requestAnimationFrame(() => {
                if (view === 'gallery') canvas.style.transform = `translateY(${window.scrollY * 0.05}px)`;
                ticking = false;
            });
        }, { passive: true });
    }

    document.addEventListener('DOMContentLoaded', initGallery);
    </script>
</body>
</html>
